<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; style-src 'unsafe-inline'; script-src 'nonce-{{NONCE}}';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NNTrainer Graph Visualizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--vscode-font-family);
            color: var(--vscode-foreground);
            background: var(--vscode-editor-background);
            overflow: hidden;
        }
        .toolbar {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px;
            background: var(--vscode-titleBar-activeBackground);
            border-bottom: 1px solid var(--vscode-panel-border);
            flex-wrap: wrap;
        }
        .toolbar button {
            padding: 4px 12px;
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            border: none; border-radius: 3px; cursor: pointer; font-size: 12px;
        }
        .toolbar button:hover { background: var(--vscode-button-hoverBackground); }
        .toolbar button.active { background: var(--vscode-focusBorder); }
        .toolbar .sep { width: 1px; height: 20px; background: var(--vscode-panel-border); }
        .toolbar .stats { margin-left: auto; font-size: 11px; color: var(--vscode-descriptionForeground); }

        .main { display: flex; height: calc(100vh - 40px); position: relative; }

        .graph-pane {
            flex: 1; overflow: auto; position: relative;
            background: #1e1e2e;
            border-right: 1px solid var(--vscode-panel-border);
        }
        .pane-hdr {
            position: sticky; top: 0; z-index: 10;
            padding: 6px 12px; font-size: 12px; font-weight: 600;
            background: var(--vscode-sideBar-background);
            border-bottom: 1px solid var(--vscode-panel-border);
        }
        .pane-hdr.torch { color: #e06c75; }
        .pane-hdr.nn { color: #61afef; }
        .legend { display: inline-flex; gap: 10px; font-size: 10px; color: var(--vscode-descriptionForeground); margin-left: 12px; }
        .legend i { display: inline-block; width: 8px; height: 8px; border-radius: 50%; vertical-align: middle; margin-right: 2px; }

        .gcanvas { position: relative; min-height: 100%; transform-origin: 0 0; }
        .gcanvas svg.edges { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }
        .gcanvas .ncont { position: relative; z-index: 2; }

        /* Zoom controls */
        .zoom-ctrl {
            position: absolute; bottom: 12px; right: 12px; z-index: 30;
            display: flex; gap: 4px; align-items: center;
            background: var(--vscode-sideBar-background);
            border: 1px solid var(--vscode-panel-border);
            border-radius: 6px; padding: 3px 6px; box-shadow: 0 2px 6px rgba(0,0,0,.2);
        }
        .zoom-ctrl button {
            width: 24px; height: 24px; border: none; border-radius: 4px;
            background: var(--vscode-button-background); color: var(--vscode-button-foreground);
            cursor: pointer; font-size: 14px; line-height: 1; display: flex; align-items: center; justify-content: center;
        }
        .zoom-ctrl button:hover { background: var(--vscode-button-hoverBackground); }
        .zoom-ctrl .zoom-pct { font-size: 10px; min-width: 36px; text-align: center; color: var(--vscode-descriptionForeground); }

        /* Nodes (dark theme) */
        .nd {
            position: absolute; display: flex; flex-direction: column;
            border: 1.5px solid #555;
            border-radius: 8px; font-size: 11px; cursor: pointer;
            background: #2a2a3d;
            white-space: nowrap; text-align: center; overflow: hidden;
            transition: border-color .12s, box-shadow .12s;
            box-shadow: 0 2px 6px rgba(0,0,0,.4);
            color: #ddd;
        }
        .nd:hover { border-color: #61afef; box-shadow: 0 0 0 2px #61afef, 0 2px 8px rgba(97,175,239,.3); z-index: 5; }
        .nd.sel { border-color: #61afef; box-shadow: 0 0 0 2px #61afef; z-index: 5; }
        .nd.hl { box-shadow: 0 0 0 2px #98c379, 0 0 10px rgba(152,195,121,.3); z-index: 5; }
        .nd.mapped { border-left: 3.5px solid #98c379; }
        .nd.unmapped { border-left: 3.5px solid #e06c75; }
        .nd.skipped { border-left: 3.5px solid #d19a66; opacity: .6; }

        /* Node header (type badge) */
        .nd .nd-hdr {
            padding: 4px 8px; font-size: 9px; font-weight: 700;
            letter-spacing: .4px; text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,.08);
            border-radius: 6px 6px 0 0;
        }
        /* Node body (name) */
        .nd .nm {
            padding: 5px 8px; font-weight: 600; font-size: 11px;
            overflow: hidden; text-overflow: ellipsis;
            color: #e0e0e0;
        }

        /* FX op colors - header background (dark theme) */
        .nd.op-call_module .nd-hdr { background: rgba(152,195,121,.2); color: #98c379; }
        .nd.op-call_function .nd-hdr { background: rgba(229,192,123,.2); color: #e5c07b; }
        .nd.op-call_method .nd-hdr { background: rgba(198,120,221,.2); color: #c678dd; }
        .nd.op-get_attr .nd-hdr { background: rgba(86,182,194,.2); color: #56b6c2; }
        /* NN layer type colors - header background (dark theme) */
        .nd.lt-input .nd-hdr { background: rgba(97,175,239,.2); color: #61afef; }
        .nd.lt-fully_connected .nd-hdr { background: rgba(152,195,121,.2); color: #98c379; }
        .nd.lt-mha_core .nd-hdr { background: rgba(198,120,221,.2); color: #c678dd; }
        .nd.lt-rms_norm .nd-hdr,.nd.lt-layer_norm .nd-hdr { background: rgba(229,192,123,.2); color: #e5c07b; }
        .nd.lt-addition .nd-hdr { background: rgba(86,182,194,.2); color: #56b6c2; }
        .nd.lt-embedding .nd-hdr { background: rgba(209,154,102,.2); color: #d19a66; }
        .nd.lt-multi_head_attention .nd-hdr { background: rgba(198,120,221,.2); color: #c678dd; }
        .nd.lt-positional_encoding .nd-hdr { background: rgba(229,192,123,.2); color: #e5c07b; }
        .nd.lt-reshape .nd-hdr,.nd.lt-concat .nd-hdr { background: rgba(86,182,194,.2); color: #56b6c2; }
        .nd.lt-activation .nd-hdr { background: rgba(224,108,117,.2); color: #e06c75; }

        /* Edges (dark theme) */
        .eline { stroke: #666; stroke-width: 1.5; fill: none; opacity: .7; }
        .eline.hl { stroke: #61afef; stroke-width: 2.5; opacity: 1; }
        .earr { fill: #666; opacity: .7; }
        .earr.hl { fill: #61afef; opacity: 1; }

        /* Mapping overlay */
        svg.moverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
        .mline { stroke: #98c379; stroke-width: 1; stroke-dasharray: 4 3; opacity: .3; fill: none; }
        .mline.act { stroke-width: 2.5; opacity: .85; stroke-dasharray: none; }

        /* Source panes */
        .src-pane { flex: 1; overflow: auto; display: none; border-right: 1px solid var(--vscode-panel-border); }
        .src-pane.vis { display: block; }
        .src-code {
            padding: 8px 12px; font-family: var(--vscode-editor-fontFamily, monospace);
            font-size: 12px; white-space: pre; line-height: 1.5; counter-reset: line;
        }
        .src-code .ln { display: block; padding: 0 8px 0 48px; position: relative; }
        .src-code .ln::before {
            content: counter(line); counter-increment: line;
            position: absolute; left: 0; width: 40px; text-align: right;
            color: var(--vscode-editorLineNumber-foreground); font-size: 11px;
        }
        .src-code .ln:hover { background: var(--vscode-editor-hoverHighlightBackground); }

        /* Verification */
        .vpanel {
            width: 320px; min-width: 320px; overflow-y: auto;
            background: var(--vscode-sideBar-background);
            border-left: 1px solid var(--vscode-panel-border);
            padding: 8px; font-size: 11px; display: none;
        }
        .vpanel.vis { display: block; }
        .vpanel h3 { font-size: 12px; margin: 10px 0 4px; color: var(--vscode-sideBarTitle-foreground); }
        .vpanel h3:first-child { margin-top: 4px; }
        .badge { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 600; }
        .badge.ok { background: #2d4a2d; color: #98c379; }
        .badge.warn { background: #4a3d2d; color: #d19a66; }
        .badge.err { background: #4a2d2d; color: #e06c75; }
        .vi { padding: 3px 6px; margin: 2px 0; border-radius: 3px; background: var(--vscode-editor-background); font-size: 10px; }
        .vi.clickable { cursor: pointer; }
        .vi.clickable:hover { background: var(--vscode-list-hoverBackground); }
        .vsec { border-left: 2px solid var(--vscode-panel-border); margin: 4px 0; padding-left: 8px; }
        .vsec.pass { border-color: #98c379; }
        .vsec.fail { border-color: #e06c75; }
        .vsec.warn { border-color: #d19a66; }
        .vtabs { display: flex; gap: 4px; margin: 8px 0 6px; }
        .vtab { padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 10px; background: var(--vscode-editor-background); }
        .vtab.active { background: var(--vscode-focusBorder); color: var(--vscode-button-foreground); }
        .vmono { font-family: var(--vscode-editor-fontFamily, monospace); font-size: 10px; word-break: break-all; white-space: pre-wrap; }

        /* Property Inspector (Phase 4) */
        .inspector {
            width: 340px; min-width: 340px; overflow-y: auto;
            background: var(--vscode-sideBar-background);
            border-left: 1px solid var(--vscode-panel-border);
            padding: 8px; font-size: 11px; display: none;
        }
        .inspector.vis { display: block; }
        .inspector h3 { font-size: 12px; margin: 8px 0 4px; color: var(--vscode-sideBarTitle-foreground); }
        .inspector h3:first-child { margin-top: 2px; }
        .prop-table { width: 100%; border-collapse: collapse; font-size: 10px; margin: 4px 0; }
        .prop-table th { text-align: left; padding: 2px 4px; background: var(--vscode-editor-background); font-weight: 600; border-bottom: 1px solid var(--vscode-panel-border); }
        .prop-table td { padding: 2px 4px; border-bottom: 1px solid var(--vscode-panel-border); vertical-align: top; }
        .prop-table td.k { color: var(--vscode-descriptionForeground); width: 35%; font-family: var(--vscode-editor-fontFamily, monospace); }
        .prop-table td.v { font-family: var(--vscode-editor-fontFamily, monospace); word-break: break-all; }
        .prop-table td.match { color: #98c379; }
        .prop-table td.diff { color: #e06c75; }
        .shape-flow { display: flex; align-items: center; gap: 6px; margin: 4px 0; font-size: 10px; }
        .shape-box { padding: 2px 6px; border-radius: 3px; background: var(--vscode-editor-background); font-family: var(--vscode-editor-fontFamily, monospace); }
        .shape-box.warn { border: 1px solid #d19a66; }
        .shape-arrow { color: var(--vscode-descriptionForeground); }
        .wmap-row { display: flex; gap: 6px; align-items: center; margin: 2px 0; font-size: 10px; }
        .wmap-key { flex: 1; padding: 2px 4px; background: var(--vscode-editor-background); border-radius: 3px; font-family: var(--vscode-editor-fontFamily, monospace); word-break: break-all; }
        .wmap-xform { padding: 1px 4px; border-radius: 3px; font-size: 9px; font-weight: 600; }
        .wmap-xform.transpose { background: #4a3d2d; color: #d19a66; }
        .wmap-xform.direct { background: #2d4a2d; color: #98c379; }
        .itabs { display: flex; gap: 3px; margin: 6px 0 4px; }
        .itab { padding: 2px 8px; border-radius: 3px; cursor: pointer; font-size: 10px; background: var(--vscode-editor-background); }
        .itab.active { background: var(--vscode-focusBorder); color: var(--vscode-button-foreground); }
        .empty-msg { padding: 16px; text-align: center; color: var(--vscode-descriptionForeground); font-size: 11px; }

        /* Group boxes (Phase 6) */
        /* Block-level groups (Transformer Layer N) - dark theme */
        .group-box {
            position: absolute; border-radius: 8px;
            pointer-events: none; z-index: 0;
        }
        .group-box.block { border: 1.5px solid rgba(255,255,255,.15); background: rgba(255,255,255,.04); border-radius: 10px; }
        .group-box.embed { border: 1.5px solid rgba(209,154,102,.4); background: rgba(209,154,102,.06); }
        .group-box.head { border: 1.5px solid rgba(97,175,239,.4); background: rgba(97,175,239,.06); }
        /* Sub-group boxes (Attn, FFN, Norm inside block) */
        .group-box.sub { border: 1.5px dashed; border-radius: 6px; }
        .group-box.sub.attn { border-color: rgba(198,120,221,.5); background: rgba(198,120,221,.06); }
        .group-box.sub.ffn { border-color: rgba(97,175,239,.5); background: rgba(97,175,239,.06); }
        .group-box.sub.norm { border-color: rgba(229,192,123,.5); background: rgba(229,192,123,.06); }

        .group-label {
            position: absolute; font-weight: 700; padding: 2px 6px;
            border-radius: 3px; pointer-events: auto; cursor: pointer; z-index: 3;
        }
        .group-label.block { font-size: 11px; background: rgba(255,255,255,.12); color: #bbb; border-radius: 4px; }
        .group-label.embed { font-size: 10px; background: rgba(209,154,102,.25); color: #d19a66; }
        .group-label.head { font-size: 10px; background: rgba(97,175,239,.25); color: #61afef; }
        .group-label.sub { font-size: 8px; font-weight: 600; }
        .group-label.sub.attn { background: rgba(198,120,221,.2); color: #c678dd; }
        .group-label.sub.ffn { background: rgba(97,175,239,.2); color: #61afef; }
        .group-label.sub.norm { background: rgba(229,192,123,.2); color: #e5c07b; }
        .group-label:hover { opacity: .85; }
        .nd.grouped-hidden { display: none !important; }
        .eline.grouped-hidden { display: none !important; }

        /* C++ source highlight */
        .src-code .ln.cpp-hl { background: rgba(97,175,239,.15); border-left: 2px solid #61afef; }

        /* Syntax highlighting (One Dark inspired) */
        .src-code .kw { color: #c678dd; }          /* keywords */
        .src-code .ty { color: #e5c07b; }          /* types */
        .src-code .fn { color: #61afef; }          /* function calls */
        .src-code .st { color: #98c379; }          /* strings */
        .src-code .nu { color: #d19a66; }          /* numbers */
        .src-code .cm { color: #5c6370; font-style: italic; } /* comments */
        .src-code .pp { color: #c678dd; }          /* preprocessor */
        .src-code .op { color: #56b6c2; }          /* operators :: -> */

        /* Profile heatmap overlay */
        .nd.profiled { position: relative; }
        .nd .pbar { position: absolute; bottom: 0; left: 0; height: 3px; border-radius: 0 0 3px 3px; transition: width .3s; }
        .nd .ptime { position: absolute; top: -14px; right: 0; font-size: 8px; background: rgba(0,0,0,.7); color: #fff; padding: 0 3px; border-radius: 2px; white-space: nowrap; display: none; }
        .nd.profiled:hover .ptime { display: block; }
        .nd.bottleneck { box-shadow: 0 0 8px #e06c75; }
        .nd.bottleneck .pbar { height: 4px; }

        /* Profile panel */
        .ppanel {
            width: 280px; min-width: 280px; overflow-y: auto;
            background: var(--vscode-sideBar-background);
            border-left: 1px solid var(--vscode-panel-border);
            padding: 8px; font-size: 11px; display: none;
        }
        .ppanel.vis { display: block; }
        .ppanel h3 { font-size: 12px; margin: 8px 0 4px; }
        .prow { display: flex; align-items: center; gap: 4px; margin: 2px 0; font-size: 10px; cursor: pointer; padding: 2px 4px; border-radius: 3px; }
        .prow:hover { background: var(--vscode-list-hoverBackground); }
        .prow .pname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .prow .pval { font-family: var(--vscode-editor-fontFamily, monospace); font-size: 9px; min-width: 50px; text-align: right; }
        .prow .pbar-h { flex: 0 0 60px; height: 8px; background: var(--vscode-editor-background); border-radius: 2px; overflow: hidden; }
        .prow .pbar-fill { height: 100%; border-radius: 2px; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button id="b-sbs" class="active">Side by Side</button>
        <button id="b-nn">NNTrainer Only</button>
        <button id="b-fx">Torch FX Only</button>
        <div class="sep"></div>
        <button id="b-map">Mapping Lines</button>
        <button id="b-ver">Verification</button>
        <div class="sep"></div>
        <button id="b-group">Groups</button>
        <button id="b-prof">Profile</button>
        <button id="b-insp">Inspector</button>
        <div class="sep"></div>
        <button id="b-tsrc">PyTorch Source</button>
        <button id="b-csrc">C++ Output</button>
        <button id="b-export">Export</button>
        <span class="stats" id="stats"></span>
    </div>
    <div class="main" id="main">
        <div class="src-pane" id="sp-torch">
            <div class="pane-hdr" style="color:#e5c07b">PyTorch Source</div>
            <div class="src-code" id="sc-torch"></div>
        </div>
        <div class="graph-pane" id="p-fx">
            <div class="pane-hdr torch">PyTorch FX Graph
                <span class="legend"><span><i style="background:#98c379"></i>module</span><span><i style="background:#e5c07b"></i>function</span><span><i style="background:#c678dd"></i>method</span></span>
            </div>
            <div class="gcanvas" id="gc-fx"><svg class="edges" id="eg-fx"></svg><div class="ncont" id="nc-fx"></div></div>
            <div class="zoom-ctrl" data-pane="fx">
                <button data-z="out" title="Zoom Out (-)">-</button>
                <span class="zoom-pct">100%</span>
                <button data-z="in" title="Zoom In (+)">+</button>
                <button data-z="fit" title="Fit to View">Fit</button>
                <button data-z="reset" title="Reset Zoom">1:1</button>
            </div>
        </div>
        <div class="graph-pane" id="p-nn">
            <div class="pane-hdr nn">NNTrainer Graph
                <span class="legend"><span><i style="background:#98c379"></i>mapped</span><span><i style="background:#e06c75"></i>unmapped</span><span><i style="background:#d19a66"></i>skip</span></span>
            </div>
            <div class="gcanvas" id="gc-nn"><svg class="edges" id="eg-nn"></svg><div class="ncont" id="nc-nn"></div></div>
            <div class="zoom-ctrl" data-pane="nn">
                <button data-z="out" title="Zoom Out (-)">-</button>
                <span class="zoom-pct">100%</span>
                <button data-z="in" title="Zoom In (+)">+</button>
                <button data-z="fit" title="Fit to View">Fit</button>
                <button data-z="reset" title="Reset Zoom">1:1</button>
            </div>
        </div>
        <div class="src-pane" id="sp-cpp">
            <div class="pane-hdr" style="color:#61afef">Generated C++</div>
            <div class="src-code" id="sc-cpp"></div>
        </div>
        <div class="vpanel" id="vpanel"></div>
        <div class="ppanel" id="ppanel"></div>
        <div class="inspector" id="inspector"></div>
        <svg class="moverlay" id="moverlay"></svg>
    </div>

    <script nonce="{{NONCE}}">
    (function() {
        const vscode = acquireVsCodeApi();
        const D = {{DATA}};

        /* ---- constants (Netron-inspired sizing) ---- */
        const NW = 180, NH = 56, HG = 32, VG = 40, PAD = 32;

        /* ---- lookup maps ---- */
        const fxMap = new Map(), nnMap = new Map();
        D.fxGraph.forEach(n => fxMap.set(n.name, n));
        D.nntrainerLayers.forEach(l => nnMap.set(l.name, l));
        const mByFx = new Map(), mByNn = new Map();
        D.nodeMapping.forEach(m => {
            mByFx.set(m.fxNodeName, m);
            if (m.nntrainerLayerName) mByNn.set(m.nntrainerLayerName, m);
        });

        /* ---- stats ---- */
        const nMapped = D.nodeMapping.filter(m => m.mappingType === 'direct').length;
        const nSkip = D.nodeMapping.filter(m => m.mappingType === 'skipped').length;
        const nUnmap = D.unsupportedOps.length + D.unknownLayers.length;
        document.getElementById('stats').textContent =
            'FX:' + D.fxGraph.length + ' | NN:' + D.nntrainerLayers.length +
            ' | Map:' + nMapped + ' | Skip:' + nSkip + (nUnmap ? ' | Unmap:' + nUnmap : '');

        /* ---- state ---- */
        let selFx = null, selNn = null, viewMode = 'sbs';
        let showMap = false, showVer = false, showInsp = true, showTSrc = false, showCSrc = false;
        let showGroups = true;
        let inspTab = 'props';

        /* ---- zoom state ---- */
        const zoomState = { fx: 1.0, nn: 1.0 };
        const ZOOM_MIN = 0.15, ZOOM_MAX = 3.0, ZOOM_STEP = 0.05;
        // Track canvas dimensions for fit-to-view
        const canvasDims = { fx: { w: 0, h: 0 }, nn: { w: 0, h: 0 } };

        function applyZoom(paneId) {
            const z = zoomState[paneId];
            const gc = document.getElementById('gc-' + paneId);
            gc.style.transform = 'scale(' + z + ')';
            // Update the scrollable area so scroll works correctly with scale
            const dims = canvasDims[paneId];
            gc.style.width = (dims.w * z) + 'px';
            gc.style.height = (dims.h * z) + 'px';
            gc.style.transformOrigin = '0 0';
            // Undo the scaled internal size so children stay correct
            gc.children[0].setAttribute('width', dims.w);
            gc.children[0].setAttribute('height', dims.h);
            // Update percentage label
            const ctrl = document.querySelector('.zoom-ctrl[data-pane="'+paneId+'"]');
            if (ctrl) ctrl.querySelector('.zoom-pct').textContent = Math.round(z * 100) + '%';
            schedMap();
        }

        function zoomTo(paneId, newZ) {
            zoomState[paneId] = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, newZ));
            applyZoom(paneId);
        }

        function zoomFit(paneId) {
            const pane = document.getElementById('p-' + paneId);
            const dims = canvasDims[paneId];
            if (!dims.w || !dims.h) return;
            const pw = pane.clientWidth - 8;
            const ph = pane.clientHeight - 40; // minus header
            const z = Math.min(pw / dims.w, ph / dims.h, 1.0);
            zoomTo(paneId, z);
        }

        // Zoom controls click handler
        document.querySelectorAll('.zoom-ctrl').forEach(ctrl => {
            const paneId = ctrl.dataset.pane;
            ctrl.querySelectorAll('button').forEach(btn => {
                btn.onclick = e => {
                    e.stopPropagation();
                    const action = btn.dataset.z;
                    if (action === 'in') zoomTo(paneId, zoomState[paneId] + ZOOM_STEP);
                    else if (action === 'out') zoomTo(paneId, zoomState[paneId] - ZOOM_STEP);
                    else if (action === 'fit') zoomFit(paneId);
                    else if (action === 'reset') zoomTo(paneId, 1.0);
                };
            });
        });

        // Mouse wheel zoom (Ctrl+scroll)
        ['fx', 'nn'].forEach(paneId => {
            document.getElementById('p-' + paneId).addEventListener('wheel', e => {
                if (!e.ctrlKey && !e.metaKey) return;
                e.preventDefault();
                const delta = e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
                zoomTo(paneId, zoomState[paneId] + delta);
            }, { passive: false });
        });

        // Keyboard zoom: +/- when graph pane focused
        document.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            const panes = [];
            if (viewMode === 'sbs') panes.push('fx', 'nn');
            else if (viewMode === 'fx') panes.push('fx');
            else if (viewMode === 'nn') panes.push('nn');
            if (e.key === '=' || e.key === '+') { panes.forEach(p => zoomTo(p, zoomState[p] + ZOOM_STEP)); e.preventDefault(); }
            else if (e.key === '-') { panes.forEach(p => zoomTo(p, zoomState[p] - ZOOM_STEP)); e.preventDefault(); }
            else if (e.key === '0') { panes.forEach(p => zoomTo(p, 1.0)); e.preventDefault(); }
        });

        /* ==================================================================
         * DAG Layout (longest-path layering + barycenter ordering)
         * ================================================================== */
        function dagLayout(nodes, getInputs) {
            const nameSet = new Set(nodes.map(n => n.id));
            const depth = new Map();
            function d(id) {
                if (depth.has(id)) return depth.get(id);
                depth.set(id, 0);
                const inp = getInputs(id).filter(i => nameSet.has(i));
                if (!inp.length) return 0;
                const v = 1 + Math.max(...inp.map(d));
                depth.set(id, v);
                return v;
            }
            nodes.forEach(n => d(n.id));

            // Build adjacency for children lookup
            const children = new Map(); // parent -> [child, ...]
            nodes.forEach(n => {
                const inp = getInputs(n.id).filter(i => nameSet.has(i));
                inp.forEach(p => {
                    if (!children.has(p)) children.set(p, []);
                    children.get(p).push(n.id);
                });
            });

            const layers = [];
            nodes.forEach(n => { const dd = depth.get(n.id)||0; (layers[dd]||(layers[dd]=[])).push(n); });

            // Barycenter ordering: reduce edge crossings by placing nodes
            // close to the average position of their connected nodes
            // Run multiple passes for better results
            for (let pass = 0; pass < 4; pass++) {
                // Forward pass: order each layer by avg position of parents
                for (let li = 1; li < layers.length; li++) {
                    if (!layers[li]) continue;
                    const prevLayer = layers[li-1];
                    if (!prevLayer) continue;
                    const prevPos = new Map();
                    prevLayer.forEach((n, i) => prevPos.set(n.id, i));

                    layers[li].forEach(n => {
                        const parents = getInputs(n.id).filter(i => nameSet.has(i) && prevPos.has(i));
                        if (parents.length > 0) {
                            n._bary = parents.reduce((s, p) => s + prevPos.get(p), 0) / parents.length;
                        } else {
                            n._bary = Infinity;
                        }
                    });
                    layers[li].sort((a, b) => a._bary - b._bary);
                }
                // Backward pass: order each layer by avg position of children
                for (let li = layers.length - 2; li >= 0; li--) {
                    if (!layers[li]) continue;
                    const nextLayer = layers[li+1];
                    if (!nextLayer) continue;
                    const nextPos = new Map();
                    nextLayer.forEach((n, i) => nextPos.set(n.id, i));

                    layers[li].forEach(n => {
                        const kids = (children.get(n.id) || []).filter(c => nextPos.has(c));
                        if (kids.length > 0) {
                            n._bary = kids.reduce((s, c) => s + nextPos.get(c), 0) / kids.length;
                        } else {
                            n._bary = Infinity;
                        }
                    });
                    layers[li].sort((a, b) => a._bary - b._bary);
                }
            }

            let maxW = 0;
            layers.forEach(l => { if (l && l.length > maxW) maxW = l.length; });

            const pos = new Map();
            const mxTot = maxW * NW + (maxW - 1) * HG;
            layers.forEach((layer, li) => {
                if (!layer) return;
                const tot = layer.length * NW + (layer.length - 1) * HG;
                const sx = PAD + (mxTot - tot) / 2;
                layer.forEach((n, ci) => {
                    pos.set(n.id, { x: sx + ci * (NW + HG), y: PAD + li * (NH + VG) });
                });
            });
            return { pos, h: PAD*2 + layers.length*(NH+VG), w: PAD*2 + mxTot };
        }

        /* ==================================================================
         * SVG helpers
         * ================================================================== */
        function esc(t) { return t ? String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
        const SVG_NS = 'http://www.w3.org/2000/svg';
        function mkPath(svg, x1,y1,x2,y2,cls,marker,dfrom,dto) {
            const p = document.createElementNS(SVG_NS,'path');
            const dy = y2 - y1;
            // Use cubic bezier with 40% control point offset for smooth curves
            const cy = Math.max(Math.abs(dy) * 0.4, 20);
            p.setAttribute('d','M'+x1+','+y1+' C'+x1+','+(y1+cy)+' '+x2+','+(y2-cy)+' '+x2+','+y2);
            p.setAttribute('class','eline '+cls);
            p.setAttribute('marker-end','url(#'+marker+')');
            p.dataset.from = dfrom; p.dataset.to = dto;
            svg.appendChild(p);
        }

        /** Compute fanned x-offsets for edges sharing a node port.
         *  Returns Map<edgeKey, {srcX, dstX}> */
        function computeFanOffsets(edges, pos) {
            // Group outgoing edges by source node, incoming edges by dest node
            const outgoing = new Map(); // srcId -> [dstId, ...]
            const incoming = new Map(); // dstId -> [srcId, ...]
            edges.forEach(([src, dst]) => {
                if (!outgoing.has(src)) outgoing.set(src, []);
                outgoing.get(src).push(dst);
                if (!incoming.has(dst)) incoming.set(dst, []);
                incoming.get(dst).push(src);
            });

            const fanMap = new Map(); // "src->dst" -> {srcX, dstX}
            const SPREAD = Math.min(NW * 0.7, 80); // max fan width

            // Fan outgoing edges at source bottom
            outgoing.forEach((dsts, src) => {
                const sp = pos.get(src); if (!sp) return;
                const n = dsts.length;
                dsts.sort((a,b) => {
                    const pa = pos.get(a), pb = pos.get(b);
                    if (!pa || !pb) return 0;
                    return pa.x - pb.x; // sort by target x position
                });
                dsts.forEach((dst, i) => {
                    const key = src+'->'+dst;
                    const offset = n === 1 ? 0 : (i / (n - 1) - 0.5) * SPREAD;
                    if (!fanMap.has(key)) fanMap.set(key, { srcX: 0, dstX: 0 });
                    fanMap.get(key).srcX = sp.x + NW/2 + offset;
                });
            });

            // Fan incoming edges at dest top
            incoming.forEach((srcs, dst) => {
                const dp = pos.get(dst); if (!dp) return;
                const n = srcs.length;
                srcs.sort((a,b) => {
                    const pa = pos.get(a), pb = pos.get(b);
                    if (!pa || !pb) return 0;
                    return pa.x - pb.x;
                });
                srcs.forEach((src, i) => {
                    const key = src+'->'+dst;
                    const offset = n === 1 ? 0 : (i / (n - 1) - 0.5) * SPREAD;
                    if (!fanMap.has(key)) fanMap.set(key, { srcX: dp.x + NW/2, dstX: 0 });
                    fanMap.get(key).dstX = dp.x + NW/2 + offset;
                });
            });

            return fanMap;
        }
        function initSvg(svg, w, h, prefix) {
            svg.setAttribute('width', w); svg.setAttribute('height', h);
            svg.innerHTML = '<defs>' +
                '<marker id="'+prefix+'a" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L0,5 L5,2.5Z" class="earr"/></marker>' +
                '<marker id="'+prefix+'ah" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L0,5 L5,2.5Z" class="earr hl"/></marker>' +
                '</defs>';
        }

        /* ==================================================================
         * Render FX Graph
         * ================================================================== */
        function renderFx() {
            const nc = document.getElementById('nc-fx');
            const svg = document.getElementById('eg-fx');
            nc.innerHTML = '';
            const vis = D.fxGraph.filter(n => n.op!=='placeholder' && n.op!=='output');
            const ln = vis.map(n => ({id:n.name, d:n}));
            const {pos,h,w} = dagLayout(ln, id => { const n=fxMap.get(id); return n?(n.args||[]):[]; });
            nc.style.width = w+'px'; nc.style.height = h+'px';
            canvasDims.fx = { w, h };
            initSvg(svg, w, h, 'fx');

            // Collect all edges and compute fan offsets
            const edges = [];
            vis.forEach(n => {
                (n.args||[]).forEach(a => { if(pos.has(a)) edges.push([a, n.name]); });
            });
            const fan = computeFanOffsets(edges, pos);

            vis.forEach(n => {
                const tp = pos.get(n.name); if(!tp) return;
                (n.args||[]).forEach(a => {
                    const fp = pos.get(a); if(!fp) return;
                    const key = a+'->'+n.name;
                    const f = fan.get(key);
                    const sx = f ? f.srcX : fp.x+NW/2;
                    const dx = f ? f.dstX : tp.x+NW/2;
                    mkPath(svg, sx, fp.y+NH, dx, tp.y, '', 'fxa', a, n.name);
                });
            });

            vis.forEach(n => {
                const p = pos.get(n.name); if(!p) return;
                const m = mByFx.get(n.name);
                const mc = m ? (m.mappingType==='direct'?'mapped':m.mappingType==='skipped'?'skipped':'unmapped') : 'unmapped';
                const div = document.createElement('div');
                div.className = 'nd '+mc+' op-'+n.op;
                div.dataset.fx = n.name;
                div.style.cssText = 'left:'+p.x+'px;top:'+p.y+'px;width:'+NW+'px;height:'+NH+'px';
                const st = (n.target||'').split('.').pop();
                div.innerHTML = '<div class="nd-hdr">'+esc(n.op==='call_module'?'module':n.op==='call_function'?'function':n.op==='call_method'?'method':n.op)+'</div><span class="nm">'+esc(st||n.name)+'</span>';
                div.title = n.name+'\n'+n.op+': '+n.target+(n.module_type?'\n'+n.module_type:'');
                div.onclick = e => { e.stopPropagation(); pickFx(n.name); };
                nc.appendChild(div);
            });
        }

        /* ==================================================================
         * Render NNTrainer Graph
         * ================================================================== */
        function renderNn() {
            const nc = document.getElementById('nc-nn');
            const svg = document.getElementById('eg-nn');
            nc.innerHTML = '';
            const ln = D.nntrainerLayers.map(l => ({id:l.name, d:l}));
            const {pos,h,w} = dagLayout(ln, id => { const l=nnMap.get(id); return l?(l.input_layers||[]):[]; });
            nc.style.width = w+'px'; nc.style.height = h+'px';
            canvasDims.nn = { w, h };
            initSvg(svg, w, h, 'nn');

            // Collect all edges and compute fan offsets
            const edges = [];
            D.nntrainerLayers.forEach(l => {
                (l.input_layers||[]).forEach(inp => { if(pos.has(inp)) edges.push([inp, l.name]); });
            });
            const fan = computeFanOffsets(edges, pos);

            D.nntrainerLayers.forEach(l => {
                const tp = pos.get(l.name); if(!tp) return;
                (l.input_layers||[]).forEach(inp => {
                    const fp = pos.get(inp); if(!fp) return;
                    const key = inp+'->'+l.name;
                    const f = fan.get(key);
                    const sx = f ? f.srcX : fp.x+NW/2;
                    const dx = f ? f.dstX : tp.x+NW/2;
                    mkPath(svg, sx, fp.y+NH, dx, tp.y, '', 'nna', inp, l.name);
                });
            });

            D.nntrainerLayers.forEach(l => {
                const p = pos.get(l.name); if(!p) return;
                const m = mByNn.get(l.name);
                const mc = m ? 'mapped' : '';
                const lt = 'lt-'+l.layer_type.replace(/[^a-zA-Z0-9_]/g,'_');
                const div = document.createElement('div');
                div.className = 'nd '+mc+' '+lt;
                div.dataset.nn = l.name;
                div.style.cssText = 'left:'+p.x+'px;top:'+p.y+'px;width:'+NW+'px;height:'+NH+'px';
                div.innerHTML = '<div class="nd-hdr">'+esc(l.layer_type)+'</div><span class="nm">'+esc(l.name)+'</span>';
                div.title = l.name+'\n'+l.layer_type+'\nIn: ['+(l.input_layers||[]).join(', ')+']';
                div.onclick = e => { e.stopPropagation(); pickNn(l.name); };
                nc.appendChild(div);
            });
        }

        /* ==================================================================
         * Cross-panel mapping lines
         * ================================================================== */
        function drawMap() {
            const svg = document.getElementById('moverlay');
            const main = document.getElementById('main');
            svg.innerHTML = '';
            if (!showMap || viewMode !== 'sbs') return;
            const mr = main.getBoundingClientRect();
            svg.setAttribute('width', mr.width); svg.setAttribute('height', mr.height);

            D.nodeMapping.forEach(m => {
                if (m.mappingType !== 'direct') return;
                const fe = document.querySelector('[data-fx="'+m.fxNodeName+'"]');
                const ne = document.querySelector('[data-nn="'+m.nntrainerLayerName+'"]');
                if (!fe || !ne) return;
                const fr = fe.getBoundingClientRect(), nr = ne.getBoundingClientRect();
                const pfx = document.getElementById('p-fx').getBoundingClientRect();
                const pnn = document.getElementById('p-nn').getBoundingClientRect();
                if (fr.bottom < pfx.top+30 && nr.bottom < pnn.top+30) return;
                if (fr.top > pfx.bottom && nr.top > pnn.bottom) return;

                const x1 = fr.right - mr.left, y1 = fr.top + fr.height/2 - mr.top;
                const x2 = nr.left - mr.left, y2 = nr.top + nr.height/2 - mr.top;
                const act = (selFx===m.fxNodeName || selNn===m.nntrainerLayerName);
                const p = document.createElementNS(SVG_NS, 'path');
                const mx = (x1+x2)/2;
                p.setAttribute('d','M'+x1+','+y1+' C'+mx+','+y1+' '+mx+','+y2+' '+x2+','+y2);
                p.setAttribute('class','mline'+(act?' act':''));
                svg.appendChild(p);
            });
        }

        document.getElementById('p-fx').addEventListener('scroll', schedMap);

                selFx = m.fxNodeName;

        /* ==================================================================

         * ================================================================== */
        function setView(m) {

        document.getElementById('b-tsrc').onclick = () => { showTSrc=!showTSrc; document.getElementById('sp-torch').classList.toggle('vis',showTSrc); document.getElementById('b-tsrc').classList.toggle('active',showTSrc); };
        document.getElementById('b-csrc').onclick = () => { showCSrc=!showCSrc; document.getElementById('sp-cpp').classList.toggle('vis',showCSrc); document.getElementById('b-csrc').classList.toggle('active',showCSrc); };

        /* ==================================================================
         * Verification Engine (Phase 3)
         * ================================================================== */
        let verTab = 'summary';

        /* 3-1: Node mapping verification */
        function verifyMapping() {
            const visFx = D.fxGraph.filter(n => n.op !== 'placeholder' && n.op !== 'output');
            const directMapped = D.nodeMapping.filter(m => m.mappingType === 'direct');
            const skipped = D.nodeMapping.filter(m => m.mappingType === 'skipped');
            const unmappedFx = visFx.filter(n => {
                const m = mByFx.get(n.name);
                return !m || (m.mappingType !== 'direct' && m.mappingType !== 'skipped');
            });
            const unmappedNn = D.nntrainerLayers.filter(l => {
                return !mByNn.has(l.name) && l.layer_type !== 'input';
            });
            const coverage = visFx.length > 0 ? Math.round(directMapped.length / visFx.length * 100) : 0;
            return { visFx, directMapped, skipped, unmappedFx, unmappedNn, coverage };
        }

        /* 3-2: Topology comparison */
        function verifyTopology() {
            const issues = [];
            // Build FX adjacency via nodeMapping: for each direct-mapped pair,
            // check if the NN layer's input_layers correspond to FX node's args
            D.nodeMapping.filter(m => m.mappingType === 'direct').forEach(m => {
                const fxNode = fxMap.get(m.fxNodeName);
                const nnLayer = nnMap.get(m.nntrainerLayerName);
                if (!fxNode || !nnLayer) return;

                // Get FX parent names that are also directly mapped
                const fxParents = new Set();
                (fxNode.args || []).forEach(arg => {
                    const pm = mByFx.get(arg);
                    if (pm && pm.mappingType === 'direct' && pm.nntrainerLayerName) {
                        fxParents.add(pm.nntrainerLayerName);
                    }
                });

                // Get NN input layers
                const nnInputs = new Set(nnLayer.input_layers || []);

                // Check: every NN input should trace back to an FX parent (or be an 'input' layer)
                nnInputs.forEach(inp => {
                    const inpLayer = nnMap.get(inp);
                    if (inpLayer && inpLayer.layer_type === 'input') return; // input layers are OK
                    if (!fxParents.has(inp)) {
                        // Check if the input is connected through skipped/decomposed nodes
                        const inpMapping = mByNn.get(inp);
                        if (!inpMapping) {
                            issues.push({
                                type: 'extra_input',
                                nn: m.nntrainerLayerName,
                                fx: m.fxNodeName,
                                input: inp,
                                msg: esc(m.nntrainerLayerName) + ' has input "' + esc(inp) + '" with no FX edge'
                            });
                        }
                    }
                });

                // Check: FX parents mapped to NN layers should appear in NN inputs
                fxParents.forEach(parent => {
                    if (!nnInputs.has(parent)) {
                        const parentLayer = nnMap.get(parent);
                        if (parentLayer && parentLayer.layer_type === 'input') return;
                        issues.push({
                            type: 'missing_input',
                            nn: m.nntrainerLayerName,
                            fx: m.fxNodeName,
                            input: parent,
                            msg: esc(m.nntrainerLayerName) + ' missing expected input "' + esc(parent) + '" from FX'
                        });
                    }
                });
            });
            return issues;
        }

        /* 3-3: C++ code cross-check */
        function verifyCpp() {
            const issues = [];
            const cpp = D.cppSource || '';
            if (!cpp) return { issues, layerCalls: [] };

            // Extract createLayer calls with names
            const layerCalls = [];
            const re = /createLayer\("([^"]+)"[\s\S]*?withKey\("name",\s*"([^"]+)"\)/g;
            // Also handle dynamic name patterns: "layer" + std::to_string(layer_id) + "_suffix"
            const re2 = /createLayer\("([^"]+)"/g;
            let match;
            while ((match = re2.exec(cpp)) !== null) {
                layerCalls.push({ type: match[1], pos: match.index });
            }

            // Check: every NN layer type should have a corresponding createLayer
            const cppTypes = new Set(layerCalls.map(c => c.type));
            const nnTypes = new Set(D.nntrainerLayers.map(l => l.layer_type).filter(t => t !== 'input'));
            nnTypes.forEach(t => {
                // Map common NN layer types to C++ layer type strings
                const aliases = {
                    'embedding_layer': ['embedding_layer', 'embedding'],
                    'mha_core': ['mha_core'],
                    'fully_connected': ['fully_connected'],
                    'rms_norm': ['rms_norm'],
                    'reshaped_rms_norm': ['reshaped_rms_norm'],
                    'swiglu': ['swiglu'],
                    'addition': ['addition'],
                    'layer_norm': ['layer_norm'],
                };
                const candidates = aliases[t] || [t];
                if (!candidates.some(c => cppTypes.has(c))) {
                    issues.push({
                        type: 'missing_cpp_layer',
                        layerType: t,
                        msg: 'NN layer type "' + esc(t) + '" has no createLayer() in C++'
                    });
                }
            });

            // Check: property consistency (spot check key properties)
            D.nntrainerLayers.forEach(l => {
                if (l.layer_type === 'fully_connected' && l.properties.unit) {
                    // Search for matching unit in C++
                    const unitVal = String(l.properties.unit);
                    const nameInCpp = l.name.replace(/\./g, '_');
                    // Check if unit value appears near the layer name reference
                    if (cpp.includes(unitVal) || cpp.includes('unit')) {
                        // Found - OK
                    }
                }
            });

            return { issues, layerCalls, cppTypes: [...cppTypes] };
        }

        // Color scale: green (fast) -> yellow -> red (slow)
        function profColor(pct) {
            const r = pct < 50 ? Math.round(pct / 50 * 255) : 255;
            const g = pct < 50 ? 255 : Math.round((1 - (pct - 50) / 50) * 255);
            return 'rgb(' + r + ',' + g + ',60)';
        }

        function applyProfileHeatmap() {
            if (!profileData) return;

            // Build name lookup: profile layer name -> node name mapping
            // Profile uses torch module names (e.g., "model.layers.0.self_attn.q_proj")
            // FX nodes use flattened names (e.g., "model_layers_0_self_attn_q_proj")
            // NN layers also use flattened names
            const profByName = new Map();
            profileData.layers.forEach(lp => {
                profByName.set(lp.name, lp);
                // Also store with flattened name
                const flat = lp.name.replace(/\./g, '_');
                profByName.set(flat, lp);
            });

            const bottleneckSet = new Set(profileData.bottlenecks);
            const bottleneckFlat = new Set(profileData.bottlenecks.map(b => b.replace(/\./g, '_')));

            const maxPct = Math.max(...profileData.layers.map(l => l.pct_of_total), 1);

            // Apply to FX graph nodes
            document.querySelectorAll('[data-fx]').forEach(el => {
                const fxName = el.dataset.fx;
                const fxNode = fxMap.get(fxName);
                // Try matching by fx_node_name, scope, or flattened name
                let lp = profByName.get(fxName);
                if (!lp && fxNode) lp = profByName.get(fxNode.scope);
                if (!lp && fxNode) lp = profByName.get(fxNode.target);
                if (!lp) return;

                el.classList.add('profiled');
                const pct = lp.pct_of_total / maxPct * 100;
                const color = profColor(lp.pct_of_total);

                // Add bar
                let bar = el.querySelector('.pbar');
                if (!bar) { bar = document.createElement('div'); bar.className = 'pbar'; el.appendChild(bar); }
                bar.style.width = Math.max(pct, 5) + '%';
                bar.style.background = color;

                // Add time label
                let tlbl = el.querySelector('.ptime');
                if (!tlbl) { tlbl = document.createElement('div'); tlbl.className = 'ptime'; el.appendChild(tlbl); }
                tlbl.textContent = lp.time_ms.toFixed(3) + 'ms (' + lp.pct_of_total.toFixed(1) + '%)';

                // Bottleneck highlight
                if (bottleneckSet.has(lp.name) || bottleneckFlat.has(fxName)) {
                    el.classList.add('bottleneck');
                }
            });

            // Apply to NN graph nodes (match via hf_module_name)
            document.querySelectorAll('[data-nn]').forEach(el => {
                const nnName = el.dataset.nn;
                const nnLayer = nnMap.get(nnName);
                let lp = profByName.get(nnName);
                if (!lp && nnLayer) lp = profByName.get(nnLayer.hf_module_name);
                if (!lp) return;

                el.classList.add('profiled');
                const pct = lp.pct_of_total / maxPct * 100;
                const color = profColor(lp.pct_of_total);

                let bar = el.querySelector('.pbar');
                if (!bar) { bar = document.createElement('div'); bar.className = 'pbar'; el.appendChild(bar); }
                bar.style.width = Math.max(pct, 5) + '%';
                bar.style.background = color;

                let tlbl = el.querySelector('.ptime');
                if (!tlbl) { tlbl = document.createElement('div'); tlbl.className = 'ptime'; el.appendChild(tlbl); }
                tlbl.textContent = lp.time_ms.toFixed(3) + 'ms (' + lp.pct_of_total.toFixed(1) + '%)';

                if (bottleneckSet.has(lp.name) || bottleneckFlat.has(nnName)) {
                    el.classList.add('bottleneck');
                }
            });
        }

        /* ==================================================================
         * Phase 6-1: Pattern Grouping
         * ================================================================== */
        function detectGroups(nodes, nameKey) {
            // Detect groups at multiple levels:
            // 1. Transformer block level (Layer N)
            // 2. Sub-block level (Attn, FFN, Norm, Embed)
            const blockMap = new Map();

            nodes.forEach(n => {
                const name = typeof n === 'string' ? n : (n.dataset ? n.dataset[nameKey] : n.name || '');

                // Transformer block level: model_layers_N_*
                let m = name.match(/^(model_layers_(\d+))_/);
                if (m) {
                    const blockId = m[1];
                    if (!blockMap.has(blockId)) blockMap.set(blockId, {type:'block', label:'Layer '+m[2], names:[], children: new Map()});
                    blockMap.get(blockId).names.push(name);

                    // Sub-block detection within this layer
                    const block = blockMap.get(blockId);
                    let sub = name.match(/^model_layers_\d+_(self_attn)/);
                    if (sub) {
                        const subId = blockId+'_self_attn';
                        if (!block.children.has(subId)) block.children.set(subId, {type:'attn', label:'Self Attention', names:[]});
                        block.children.get(subId).names.push(name);
                        return;
                    }
                    sub = name.match(/^model_layers_\d+_(mlp|ffn)/);
                    if (sub) {
                        const subId = blockId+'_'+sub[1];
                        if (!block.children.has(subId)) block.children.set(subId, {type:'ffn', label:sub[1].toUpperCase(), names:[]});
                        block.children.get(subId).names.push(name);
                        return;
                    }
                    sub = name.match(/^model_layers_\d+_(input_layernorm|post_attention_layernorm|rms_norm|layer_norm)/);
                    if (sub) {
                        const subId = blockId+'_norm';
                        if (!block.children.has(subId)) block.children.set(subId, {type:'norm', label:'Norm', names:[]});
                        block.children.get(subId).names.push(name);
                        return;
                    }
                    return;
                }

                // Embedding / RoPE (top-level group)
                m = name.match(/^(model_(rotary_emb|embed))/);
                if (m) {
                    const bid = m[1];
                    if (!blockMap.has(bid)) blockMap.set(bid, {type:'embed', label:m[2]==='embed'?'Embedding':'RoPE', names:[], children: new Map()});
                    blockMap.get(bid).names.push(name);
                    return;
                }

                // Output head (lm_head, model_norm, etc.)
                m = name.match(/^(lm_head|model_norm)/);
                if (m) {
                    if (!blockMap.has('output_head')) blockMap.set('output_head', {type:'head', label:'Output Head', names:[], children: new Map()});
                    blockMap.get('output_head').names.push(name);
                }
            });

            const groups = [];
            blockMap.forEach((info) => {
                if (info.names.length >= 2) {
                    // Convert children map to array
                    info.subGroups = [];
                    info.children.forEach(sub => {
                        if (sub.names.length >= 2) info.subGroups.push(sub);
                    });
                    delete info.children;
                    groups.push(info);
                }
            });
            return groups;
        }

        function drawGroups() {
            // Remove existing group elements
            document.querySelectorAll('.group-box,.group-label').forEach(e => e.remove());
            if (!showGroups) return;

            function getBounds(names, dataAttr) {
                let minX=Infinity, minY=Infinity, maxX=0, maxY=0, found=0;
                names.forEach(name => {
                    const el = document.querySelector('[data-'+dataAttr+'="'+name+'"]');
                    if (!el) return;
                    const x = parseInt(el.style.left)||0, y = parseInt(el.style.top)||0;
                    const w = parseInt(el.style.width)||NW, h = parseInt(el.style.height)||NH;
                    if (x < minX) minX = x;
                    if (y < minY) minY = y;
                    if (x+w > maxX) maxX = x+w;
                    if (y+h > maxY) maxY = y+h;
                    found++;
                });
                return { minX, minY, maxX, maxY, found };
            }

            function renderGroupsOnPane(nc, groups, dataAttr) {
                groups.forEach(g => {
                    const b = getBounds(g.names, dataAttr);
                    if (b.found < 2) return;

                    // Outer block box (larger padding for block-level groups)
                    const isBlock = g.type === 'block';
                    const pad = isBlock ? 12 : 6;
                    const box = document.createElement('div');
                    box.className = 'group-box '+g.type;
                    box.style.cssText = 'left:'+(b.minX-pad)+'px;top:'+(b.minY-pad-18)+'px;width:'+(b.maxX-b.minX+pad*2)+'px;height:'+(b.maxY-b.minY+pad*2+18)+'px';
                    nc.appendChild(box);

                    // Label
                    const lbl = document.createElement('div');
                    lbl.className = 'group-label '+g.type;
                    lbl.textContent = g.label;
                    lbl.style.cssText = 'left:'+(b.minX-pad+4)+'px;top:'+(b.minY-pad-16)+'px';
                    nc.appendChild(lbl);

                    // Sub-groups within block
                    if (g.subGroups) {
                        g.subGroups.forEach(sub => {
                            const sb = getBounds(sub.names, dataAttr);
                            if (sb.found < 2) return;
                            const sp = 5;
                            const sbox = document.createElement('div');
                            sbox.className = 'group-box sub '+sub.type;
                            sbox.style.cssText = 'left:'+(sb.minX-sp)+'px;top:'+(sb.minY-sp-14)+'px;width:'+(sb.maxX-sb.minX+sp*2)+'px;height:'+(sb.maxY-sb.minY+sp*2+14)+'px';
                            nc.appendChild(sbox);
                            const slbl = document.createElement('div');
                            slbl.className = 'group-label sub '+sub.type;
                            slbl.textContent = sub.label;
                            slbl.style.cssText = 'left:'+(sb.minX-sp+2)+'px;top:'+(sb.minY-sp-13)+'px';
                            nc.appendChild(slbl);
                        });
                    }
                });
            }

            // Draw groups on NN graph
            renderGroupsOnPane(
                document.getElementById('nc-nn'),
                detectGroups(D.nntrainerLayers, 'nn'),
                'nn'
            );
            // Draw groups on FX graph
            renderGroupsOnPane(
                document.getElementById('nc-fx'),
                detectGroups(D.fxGraph.filter(n=>n.op!=='placeholder'&&n.op!=='output'), 'fx'),
                'fx'
            );
        }

        /* ==================================================================
         * Phase 6-2: C++ Source Linking
         * ================================================================== */
        // Build line index: NN layer name -> C++ line number
        const cppLineMap = new Map();
        if (D.cppSource) {
            const cppLines = D.cppSource.split('\n');

            // Index C++ LayerHandle declarations and Tensor::add() calls
            const cppHandles = []; // [{line, varName, layerType}]
            const cppAddLines = []; // [{line, varName}]
            cppLines.forEach((line, i) => {
                let m = line.match(/LayerHandle\s+(\w+)\s*\(\s*createLayer\s*\(\s*"([^"]+)"/);
                if (!m) m = line.match(/LayerHandle\s+(\w+)\s*\(\s*createLayer\s*\(\s*(\w+)/);
                if (m) cppHandles.push({line: i+1, varName: m[1], layerType: m[2]});
                let ma = line.match(/Tensor\s+(\w+)\s*=\s*\w+\.add\s*\(/);
                if (ma) cppAddLines.push({line: i+1, varName: ma[1]});
            });

            // Build handle lookup by varName
            const handleByVar = new Map();
            cppHandles.forEach(h => { if (!handleByVar.has(h.varName)) handleByVar.set(h.varName, h.line); });

            // Alias: NN layer name suffix -> C++ handle variable name
            // Covers naming differences between HF module paths and C++ emitter
            const suffixAlias = {
                // Pre-attention norm (various naming conventions)
                'input_layernorm': 'att_norm',
                'pre_attn_norm': 'att_norm',
                'attention_norm': 'att_norm',
                'ln_1': 'att_norm',
                // MHA core
                'attention': 'attn',
                'self_attention': 'attn',
                'self_attn': 'attn',
                // Post-attention / pre-FFN norm
                'post_attention_layernorm': 'ffn_norm',
                'pre_ffn_norm': 'ffn_norm',
                'ln_2': 'ffn_norm',
                // Cross-attention norm (encoder-decoder)
                'cross_attn_norm': 'cross_norm',
                'encoder_attn_layer_norm': 'cross_norm',
                // FFN projections (SwiGLU)
                'up_proj': 'ffn_up',
                'gate_proj': 'ffn_gate',
                'down_proj': 'ffn_down',
                // FFN projections (standard GELU/ReLU)
                'fc1': 'ffn_fc1',
                'fc2': 'ffn_down',
                'c_fc': 'ffn_fc1',
                'c_proj': 'ffn_down',
                // Embedding and LM head
                'embed_tokens': 'embedding',
                'word_embeddings': 'embedding',
                'wte': 'embedding',
                'lm_head': 'lmhead',
                // Encoder/decoder output norm
                'final_layer_norm': 'output_norm',
                'final_layernorm': 'output_norm',
                'ln_f': 'output_norm',
            };

            let addIdx = 0;
            D.nntrainerLayers.forEach(l => {
                // Addition layers map to .add() calls in block methods
                if (l.layer_type === 'addition' && addIdx < cppAddLines.length) {
                    cppLineMap.set(l.name, cppAddLines[addIdx].line);
                    addIdx++;
                    return;
                }
                const parts = l.name.split('_');
                // Try progressively longer suffixes (up to 4 for post_attention_layernorm)
                const maxSuffix = Math.min(4, parts.length);
                for (let len = 1; len <= maxSuffix; len++) {
                    const suffix = parts.slice(-len).join('_');
                    // Direct match
                    if (handleByVar.has(suffix)) {
                        cppLineMap.set(l.name, handleByVar.get(suffix));
                        return;
                    }
                    // Alias match
                    const alias = suffixAlias[suffix];
                    if (alias && handleByVar.has(alias)) {
                        cppLineMap.set(l.name, handleByVar.get(alias));
                        return;
                    }
                }
                // Fallback: type-based match for unique global layers
                const typeToHandle = {
                    'embedding_layer': 'embedding',
                    'tie_word_embeddings': 'embedding',
                    'rms_norm': 'output_norm',
                    'layer_normalization': 'output_norm',
                };
                const fallbackVar = typeToHandle[l.layer_type];
                if (fallbackVar && handleByVar.has(fallbackVar) && !cppLineMap.has(l.name)) {
                    cppLineMap.set(l.name, handleByVar.get(fallbackVar));
                }
            });
        }

        function highlightCppLine(layerName) {

            report += '- Layer types: ' + cv.cppTypes.join(', ') + '\n';
            report += '- Issues: ' + cv.issues.length + '\n';
            cv.issues.forEach(i => report += '- ' + i.msg + '\n');

            if (D.unsupportedOps.length) {
                report += '## Unsupported Ops\n';
                D.unsupportedOps.forEach(o => report += '- ' + o + '\n');

                h += '<tr><td class="k">args</td><td class="v">'+esc((fxNode.args||[]).join(', '))+'</td></tr>';
                if (fxNode.output_shape) h += '<tr><td class="k">output_shape</td><td class="v">'+esc(JSON.stringify(fxNode.output_shape))+'</td></tr>';
                // Meta properties
                const meta = fxNode.meta || {};
                Object.keys(meta).forEach(k => {
                    h += '<tr><td class="k">meta.'+esc(k)+'</td><td class="v">'+esc(JSON.stringify(meta[k]))+'</td></tr>';
                });
                h += '</table>';
            }

            if (nnLayer) {
                h += '<h3 style="color:#61afef">NN Layer: '+esc(nnLayer.name)+'</h3>';
                h += '<table class="prop-table"><tr><th>Key</th><th>Value</th></tr>';
                h += '<tr><td class="k">layer_type</td><td class="v">'+esc(nnLayer.layer_type)+'</td></tr>';
                h += '<tr><td class="k">input_layers</td><td class="v">'+esc((nnLayer.input_layers||[]).join(', '))+'</td></tr>';
                h += '<tr><td class="k">hf_module</td><td class="v">'+esc(nnLayer.hf_module_name)+'</td></tr>';
                h += '<tr><td class="k">hf_type</td><td class="v">'+esc(nnLayer.hf_module_type)+'</td></tr>';
                Object.entries(nnLayer.properties||{}).forEach(([k,v]) => {
                    h += '<tr><td class="k">'+esc(k)+'</td><td class="v">'+esc(String(v))+'</td></tr>';
                });
                h += '</table>';
            }

            // Side-by-side comparison if both exist
            if (fxNode && nnLayer) {
                h += '<h3>Parameter Comparison</h3>';
                h += '<table class="prop-table"><tr><th>Parameter</th><th>FX (torch)</th><th>NN (nntrainer)</th></tr>';
                const fxMeta = fxNode.meta || {};
                const nnProps = nnLayer.properties || {};

                // Common parameter pairs to compare
                const pairs = [
                    ['num_embeddings', 'in_dim'],
                    ['embedding_dim', 'out_dim'],
                    ['in_features', 'unit'], ['out_features', 'unit'],
                    ['num_heads', 'num_heads'],
                    ['num_kv_heads', 'num_kv_heads'],
                    ['head_dim', 'head_dim'],
                    ['normalized_shape', 'epsilon'],
                ];
                let shown = new Set();
                pairs.forEach(([fk, nk]) => {
                    const fv = fxMeta[fk];
                    const nv = nnProps[nk];
                    if (fv !== undefined || nv !== undefined) {
                        const fStr = fv !== undefined ? String(fv) : '-';
                        const nStr = nv !== undefined ? String(nv) : '-';
                        const cls = (fv !== undefined && nv !== undefined && String(fv) === String(nv)) ? 'match' : (fv !== undefined && nv !== undefined) ? 'diff' : '';
                        h += '<tr><td class="k">'+esc(fk)+' / '+esc(nk)+'</td><td class="v '+cls+'">'+esc(fStr)+'</td><td class="v '+cls+'">'+esc(nStr)+'</td></tr>';
                        shown.add(fk); shown.add(nk);
                    }
                });
                // Show remaining unmatched FX meta
                Object.keys(fxMeta).forEach(k => {

                        h += '<tr><td class="k">'+esc(k)+'</td><td class="v">'+esc(String(fxMeta[k]))+'</td><td class="v" style="opacity:.4">-</td></tr>';
                    }

                // Show remaining unmatched NN props
                Object.keys(nnProps).forEach(k => {
                    if (!shown.has(k)) {
                        h += '<tr><td class="k">'+esc(k)+'</td><td class="v" style="opacity:.4">-</td><td class="v">'+esc(String(nnProps[k]))+'</td></tr>';
                    }
                });
                h += '</table>';
            }

            if (!fxNode && !nnLayer) h += '<div class="empty-msg">No node selected</div>';
            return h;
        }

        /* 4-2: Tensor dimension tracking */
        function renderShapeTab(fxNode, nnLayer) {
            let h = '';

            if (fxNode) {
                h += '<h3 style="color:#e06c75">FX: '+esc(fxNode.name)+'</h3>';
                // Input shapes from args
                const argNodes = (fxNode.args||[]).map(a => fxMap.get(a)).filter(Boolean);
                if (argNodes.length) {
                    h += '<div style="margin:4px 0;font-size:10px;color:var(--vscode-descriptionForeground)">Inputs:</div>';
                    argNodes.forEach(a => {
                        const shape = a.output_shape ? JSON.stringify(a.output_shape) : '?';
                        h += '<div class="shape-flow"><span class="shape-box">'+esc(a.name)+'</span><span class="shape-arrow">['+esc(shape)+']</span></div>';
                    });
                }
                // Output shape
                h += '<div style="margin:4px 0;font-size:10px;color:var(--vscode-descriptionForeground)">Output:</div>';
                if (fxNode.output_shape) {
                    h += '<div class="shape-flow"><span class="shape-box">'+esc(JSON.stringify(fxNode.output_shape))+'</span></div>';
                } else {
                    h += '<div class="shape-flow"><span class="shape-box warn">shape unknown</span></div>';
                }
            }

            if (nnLayer) {
                h += '<h3 style="color:#61afef">NN: '+esc(nnLayer.name)+'</h3>';
                // Input layers
                const inputs = (nnLayer.input_layers||[]);
                if (inputs.length) {
                    h += '<div style="margin:4px 0;font-size:10px;color:var(--vscode-descriptionForeground)">Inputs:</div>';
                    inputs.forEach(inp => {
                        // Try to find corresponding FX node shape
                        const inpLayer = nnMap.get(inp);
                        const inpMapping = inpLayer ? mByNn.get(inp) : null;
                        const inpFx = inpMapping ? fxMap.get(inpMapping.fxNodeName) : null;
                        const shape = inpFx && inpFx.output_shape ? JSON.stringify(inpFx.output_shape) : '?';
                        h += '<div class="shape-flow"><span class="shape-box">'+esc(inp)+'</span><span class="shape-arrow">['+esc(shape)+']</span></div>';
                    });
                }
                // Inferred output shape from properties
                const props = nnLayer.properties || {};
                h += '<div style="margin:4px 0;font-size:10px;color:var(--vscode-descriptionForeground)">Layer properties (shape-related):</div>';
                const shapeKeys = ['unit','in_dim','out_dim','num_heads','head_dim','input_shape','epsilon'];
                let hasAny = false;
                shapeKeys.forEach(k => {
                    if (props[k] !== undefined) {
                        hasAny = true;
                        h += '<div class="shape-flow"><span style="width:80px;font-size:10px">'+esc(k)+':</span><span class="shape-box">'+esc(String(props[k]))+'</span></div>';
                    }
                });
                if (!hasAny) h += '<div class="shape-flow"><span class="shape-box" style="opacity:.5">no shape properties</span></div>';
            }

            // Shape consistency check
            if (fxNode && nnLayer) {
                h += '<h3>Shape Consistency</h3>';
                const fxMeta = fxNode.meta || {};
                const nnProps = nnLayer.properties || {};
                const checks = [];

                // Check output dimension matches
                if (fxNode.output_shape && nnProps.unit) {
                    const fxOut = fxNode.output_shape[fxNode.output_shape.length - 1];
                    const nnUnit = Number(nnProps.unit);
                    if (fxOut === nnUnit) {
                        checks.push({ok:true, msg:'Output dim: FX['+fxOut+'] = NN unit['+nnUnit+']'});
                    } else {
                        checks.push({ok:false, msg:'Output dim mismatch: FX['+fxOut+'] != NN unit['+nnUnit+']'});
                    }
                }
                // Embedding check
                if (fxMeta.num_embeddings && nnProps.in_dim) {
                    const match = String(fxMeta.num_embeddings) === String(nnProps.in_dim);
                    checks.push({ok:match, msg:'Vocab: FX['+fxMeta.num_embeddings+'] '+(match?'=':'!=') +' NN['+nnProps.in_dim+']'});
                }
                if (fxMeta.embedding_dim && nnProps.out_dim) {
                    const match = String(fxMeta.embedding_dim) === String(nnProps.out_dim);
                    checks.push({ok:match, msg:'Embed dim: FX['+fxMeta.embedding_dim+'] '+(match?'=':'!=')+' NN['+nnProps.out_dim+']'});
                }

                if (checks.length) {
                    checks.forEach(c => {
                        h += '<div class="vsec '+(c.ok?'pass':'fail')+'">'+esc(c.msg)+'</div>';
                    });
                } else {
                    h += '<div class="vi" style="opacity:.5">No comparable shape parameters</div>';
                }
            }

            if (!fxNode && !nnLayer) h += '<div class="empty-msg">No node selected</div>';
            return h;
        }

            h += '<tr><td class="k">Layers with weight</td><td class="v">'+withWeight.length+'</td></tr>';
            h += '<tr><td class="k">Layers with bias</td><td class="v">'+withBias.length+'</td></tr>';
            h += '<tr><td class="k">Transposed weights</td><td class="v">'+(transposed.length?'<span style="color:#d19a66">'+transposed.length+'</span>':'0')+'</td></tr>';
            h += '<tr><td class="k">Shared weights</td><td class="v">'+(shared.length?shared.length:'0')+'</td></tr>';
            h += '<tr><td class="k">Total weight map entries</td><td class="v">'+(D.weightMap||[]).length+'</td></tr>';
            h += '</table>';

            return h;
        }

        /* Source code with syntax highlighting */
        function highlightCpp(line) {
            let h = esc(line);
            // Comments (// ...)
            h = h.replace(/^(\s*)(\/\/.*)$/, '$1<span class="cm">$2</span>');
            if (h.includes('<span class="cm">')) return h;
            // Preprocessor (#include, #ifndef, etc.)
            h = h.replace(/^(\s*)(#\w+.*)$/, '$1<span class="pp">$2</span>');
            if (h.includes('<span class="pp">')) return h;
            // Extract strings and numbers into placeholders so that
            // subsequent regexes never see "class" inside <span class=".."> tags
            const toks = [];
            function tok(v) { toks.push(v); return '\x00T'+(toks.length-1)+'\x00'; }
            h = h.replace(/(&quot;[^&]*?&quot;|"[^"]*?")/g, function(m) {
                return tok('<span class="st">'+m+'</span>');
            });
            h = h.replace(/\b(\d+\.?\d*[fF]?)\b/g, function(m) {
                return tok('<span class="nu">'+m+'</span>');
            });
            // Keywords
            h = h.replace(/\b(auto|bool|break|case|catch|class|const|constexpr|continue|default|delete|do|else|enum|explicit|extern|false|for|friend|goto|if|inline|mutable|namespace|new|noexcept|nullptr|operator|override|private|protected|public|return|sizeof|static|static_cast|struct|switch|template|this|throw|true|try|typedef|typeid|typename|using|virtual|void|volatile|while)\b/g, '<span class="kw">$1</span>');
            // Types (common C++ and NNTrainer types)
            h = h.replace(/\b(int|float|double|char|unsigned|long|short|size_t|uint32_t|int32_t|std::string|std::vector|std::map|std::shared_ptr|std::unique_ptr|std::make_shared|std::make_unique|string|vector|map|shared_ptr|unique_ptr|NeuralNetwork|LayerNode|ModelLoader|Tensor)\b/g, '<span class="ty">$1</span>');
            // Scope/arrow operators
            h = h.replace(/::/g, '<span class="op">::</span>');
            h = h.replace(/-&gt;/g, '<span class="op">-&gt;</span>');
            // Function calls: word followed by (
            h = h.replace(/\b([a-zA-Z_]\w*)\s*\(/g, function(m, fn) {
                if (m.includes('<span') || m.includes('\x00')) return m;
                return '<span class="fn">'+fn+'</span>(';
            });
            // Restore all placeholders
            h = h.replace(/\x00T(\d+)\x00/g, function(m, idx) {
                return toks[parseInt(idx)];
            });
            return h;
        }

        function highlightPython(line) {
            let h = esc(line);
            // Comments
            h = h.replace(/^(\s*)(#.*)$/, '$1<span class="cm">$2</span>');
            if (h.includes('<span class="cm">')) return h;
            // Extract strings and numbers into placeholders
            const toks = [];
            function tok(v) { toks.push(v); return '\x00T'+(toks.length-1)+'\x00'; }
            h = h.replace(/(&#39;[^&#]*?&#39;|&quot;[^&]*?&quot;|'[^']*?'|"[^"]*?")/g, function(m) {
                return tok('<span class="st">'+m+'</span>');
            });
            h = h.replace(/\b(\d+\.?\d*)\b/g, function(m) {
                return tok('<span class="nu">'+m+'</span>');
            });
            // Keywords
            h = h.replace(/\b(and|as|assert|async|await|break|class|continue|def|del|elif|else|except|finally|for|from|global|if|import|in|is|lambda|nonlocal|not|or|pass|raise|return|try|while|with|yield|None|True|False|self)\b/g, '<span class="kw">$1</span>');
            // Types
            h = h.replace(/\b(int|float|str|bool|list|dict|tuple|set|type|object|nn\.Module|torch\.Tensor)\b/g, '<span class="ty">$1</span>');
            // Decorators
            h = h.replace(/^(\s*)(@\w+)/g, '$1<span class="pp">$2</span>');
            // Function calls
            h = h.replace(/\b([a-zA-Z_]\w*)\s*\(/g, function(m, fn) {
                if (m.includes('<span') || m.includes('\x00')) return m;
                return '<span class="fn">'+fn+'</span>(';
            });
            // Restore all placeholders
            h = h.replace(/\x00T(\d+)\x00/g, function(m, idx) {
                return toks[parseInt(idx)];
            });
            return h;
        }

        function renderSrc(id, code, lang) {
            const c = document.getElementById(id);
            if (!code) { c.innerHTML='<div style="padding:16px;opacity:.5">No source</div>'; return; }
            const hl = lang === 'python' ? highlightPython : highlightCpp;
            c.innerHTML = code.split('\n').map((l,i) => {
                const span = document.createElement('span');
                return '<span class="ln" data-line="'+(i+1)+'">'+hl(l)+'</span>';
            }).join('\n');
        }

        /* ---- Init ---- */
        renderFx();
        renderNn();
        renderVer();
        renderInspector();
        document.getElementById('inspector').classList.add('vis');
        document.getElementById('b-insp').classList.add('active');
        renderProfilePanel();
        renderSrc('sc-torch', D.torchSourceCode||'', 'python');
        renderSrc('sc-cpp', D.cppSource||'', 'cpp');
        drawGroups();
        document.getElementById('b-group').classList.add('active');
    })();
    </script>
